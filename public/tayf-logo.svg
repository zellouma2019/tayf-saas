<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="25%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="75%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="spectrum2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="200" height="200" rx="40"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0F172A"/>
  <!-- Spectrum arc -->
  <g clip-path="url(#roundClip)">
    <!-- Printer shape simplified -->
    <rect x="45" y="70" width="110" height="70" rx="12" fill="url(#spectrum)" opacity="0.15"/>
    <!-- Document/Page icon -->
    <rect x="65" y="45" width="70" height="50" rx="6" fill="none" stroke="url(#spectrum)" stroke-width="3"/>
    <line x1="78" y1="60" x2="122" y2="60" stroke="url(#spectrum2)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="78" y1="70" x2="115" y2="70" stroke="url(#spectrum2)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="78" y1="80" x2="108" y2="80" stroke="url(#spectrum2)" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Spectrum bar -->
    <rect x="45" y="130" width="110" height="6" rx="3" fill="url(#spectrum)" opacity="0.9"/>
    <!-- طيف text -->
    <text x="100" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="url(#spectrum2)">طيف</text>
  </g>
</svg>
